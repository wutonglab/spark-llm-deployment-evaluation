name: Validate docker-compose

on:
  push:
    branches: [main]
    paths: ["tools/deploy/**"]
  pull_request:
    paths: ["tools/deploy/**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose template
        run: |
          cd tools/deploy
          # Provide minimal env required by interpolation
          cat > .env <<EOF
          VLLM_IMAGE=nvcr.io/nvidia/vllm:26.03.post1-py3
          CONTAINER_NAME=vllm
          VLLM_PORT=8000
          MODEL_DIR=/tmp/model-fake
          MODEL_ID=fake/model
          MAX_MODEL_LEN=262144
          MAX_NUM_BATCHED_TOKENS=16384
          GPU_MEM_UTIL=0.85
          EOF
          mkdir -p /tmp/model-fake
          # `docker compose config -f <template>` validates syntax + interpolation
          docker compose -f docker-compose.template.yml --env-file .env config > /dev/null
          rm -f .env
          echo "✅ docker-compose template valid"
