name: Python CI

on:
  push:
    branches: [main]
    paths: ["agent/**", "tools/**", "tests/**", "pyproject.toml", "**/*.py"]
  pull_request:
    paths: ["agent/**", "tools/**", "tests/**", "pyproject.toml", "**/*.py"]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          pip install -r agent/requirements.txt
          pip install httpx python-dotenv
      - name: Ruff
        run: ruff check . --exclude=evaluation-runs --exclude=site
      - name: Pytest (dry-run / mocked)
        run: pytest tests/ -v
